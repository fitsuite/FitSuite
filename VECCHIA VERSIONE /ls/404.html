<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
      if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
        var viewport = document.querySelector("meta[name=viewport]");
        if (viewport) {
          viewport.setAttribute('content', 'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no');
        }
      }
    </script>
    <title>404 - Pagina Non Trovata | FitSuite</title>
    
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #1a1a1a;
        color: white;
        font-family: 'Segoe UI', Roboto, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        overflow: hidden;
        position: relative;
        padding-top: 50px;
      }

      /* Background animated particles */
      .bg-animation {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 1;
      }

      .particle {
        position: absolute;
        width: 4px;
        height: 4px;
        background: #ff6600;
        border-radius: 50%;
        opacity: 0;
        animation: float-up 8s infinite;
      }

      @keyframes float-up {
        0% {
          opacity: 0;
          transform: translateY(100vh) scale(0);
        }
        10% {
          opacity: 0.4;
        }
        50% {
          opacity: 0.8;
          transform: translateY(50vh) scale(1);
        }
        100% {
          opacity: 0;
          transform: translateY(-10vh) scale(0.3);
        }
      }

      .container {
        text-align: center;
        z-index: 10;
        position: relative;
        padding: 20px;
        max-width: 800px;
        margin-top: 0;
      }

      /* Neon 404 styling */
      .neon-404 {
        font-size: clamp(80px, 15vw, 200px);
        font-weight: 900;
        letter-spacing: 0.1em;
        margin-bottom: 20px;
        text-transform: uppercase;
        position: relative;
        display: inline-block;
        
        /* Neon orange color */
        color: #ff6600;
        
        /* Enhanced neon glow with outline effect */
        text-shadow: 
          /* Outline for clarity */
          -2px -2px 0 #1a1a1a,
          2px -2px 0 #1a1a1a,
          -2px 2px 0 #1a1a1a,
          2px 2px 0 #1a1a1a,
          /* Neon glow layers */
          0 0 5px #ff6600,
          0 0 10px #ff6600,
          0 0 15px #ff6600,
          0 0 20px #ff6600,
          0 0 30px #ff6600,
          0 0 40px #ff6600,
          0 0 50px #ff6600,
          0 0 60px #ff6600;
        
        animation: neon-flicker 2s infinite alternate;
      }

      @keyframes neon-flicker {
        0%, 100% {
          text-shadow: 
            /* Outline for clarity */
            -2px -2px 0 #1a1a1a,
            2px -2px 0 #1a1a1a,
            -2px 2px 0 #1a1a1a,
            2px 2px 0 #1a1a1a,
            /* Neon glow layers */
            0 0 5px #ff6600,
            0 0 10px #ff6600,
            0 0 15px #ff6600,
            0 0 20px #ff6600,
            0 0 30px #ff6600,
            0 0 40px #ff6600,
            0 0 50px #ff6600,
            0 0 60px #ff6600;
        }
        50% {
          text-shadow: 
            /* Outline for clarity */
            -2px -2px 0 #1a1a1a,
            2px -2px 0 #1a1a1a,
            -2px 2px 0 #1a1a1a,
            2px 2px 0 #1a1a1a,
            /* Reduced neon glow */
            0 0 3px #ff6600,
            0 0 6px #ff6600,
            0 0 9px #ff6600,
            0 0 12px #ff6600,
            0 0 18px #ff6600,
            0 0 24px #ff6600,
            0 0 30px #ff6600,
            0 0 36px #ff6600;
        }
      }

      /* Error message styling */
      .error-message {
        font-size: clamp(24px, 4vw, 48px);
        font-weight: 300;
        margin-bottom: 30px;
        color: #ff6600;
        text-shadow: 
          /* Outline for clarity */
          -1px -1px 0 #1a1a1a,
          1px -1px 0 #1a1a1a,
          -1px 1px 0 #1a1a1a,
          1px 1px 0 #1a1a1a,
          /* Neon glow */
          0 0 5px #ff6600,
          0 0 10px #ff6600,
          0 0 15px #ff6600,
          0 0 20px #ff6600;
        animation: neon-pulse 3s infinite ease-in-out;
      }

      @keyframes neon-pulse {
        0%, 100% {
          opacity: 1;
          text-shadow: 
            /* Outline for clarity */
            -1px -1px 0 #1a1a1a,
            1px -1px 0 #1a1a1a,
            -1px 1px 0 #1a1a1a,
            1px 1px 0 #1a1a1a,
            /* Neon glow */
            0 0 5px #ff6600,
            0 0 10px #ff6600,
            0 0 15px #ff6600,
            0 0 20px #ff6600;
        }
        50% {
          opacity: 0.8;
          text-shadow: 
            /* Outline for clarity */
            -1px -1px 0 #1a1a1a,
            1px -1px 0 #1a1a1a,
            -1px 1px 0 #1a1a1a,
            1px 1px 0 #1a1a1a,
            /* Enhanced neon glow */
            0 0 8px #ff6600,
            0 0 16px #ff6600,
            0 0 24px #ff6600,
            0 0 32px #ff6600;
        }
      }

      .description {
        font-size: clamp(16px, 2.5vw, 20px);
        line-height: 1.6;
        margin-bottom: 40px;
        color: #ccc;
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
      }

      /* Neon button styling */
      .neon-button {
        display: inline-block;
        padding: 15px 40px;
        font-size: 18px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 2px;
        text-decoration: none;
        color: #1a1a1a;
        background: #ff6600;
        border: 2px solid #ff6600;
        border-radius: 50px;
        position: relative;
        overflow: hidden;
        transition: all 0.3s ease;
        
        /* Enhanced neon glow with outline */
        text-shadow: 
          /* Outline for clarity */
          -1px -1px 0 #ff6600,
          1px -1px 0 #ff6600,
          -1px 1px 0 #ff6600,
          1px 1px 0 #ff6600,
          /* Neon glow */
          0 0 5px #ff6600,
          0 0 10px #ff6600,
          0 0 15px #ff6600,
          0 0 20px #ff6600;
        
        box-shadow: 
          0 0 10px #ff6600,
          0 0 20px #ff6600,
          0 0 30px #ff6600,
          inset 0 0 10px rgba(255, 102, 0, 0.3);
      }

      .neon-button:hover {
        background: transparent;
        color: #ff6600;
        transform: translateY(-2px);
        
        /* Enhanced hover glow with outline */
        text-shadow: 
          /* Outline for clarity */
          -1px -1px 0 #1a1a1a,
          1px -1px 0 #1a1a1a,
          -1px 1px 0 #1a1a1a,
          1px 1px 0 #1a1a1a,
          /* Enhanced neon glow */
          0 0 10px #ff6600,
          0 0 20px #ff6600,
          0 0 30px #ff6600,
          0 0 40px #ff6600;
        
        box-shadow: 
          0 0 20px #ff6600,
          0 0 40px #ff6600,
          0 0 60px #ff6600,
          inset 0 0 20px rgba(255, 102, 0, 0.3);
      }

      .neon-button:active {
        transform: translateY(0);
      }

      /* Additional neon elements */
      .neon-line {
        width: 200px;
        height: 2px;
        background: #ff6600;
        margin: 30px auto;
        box-shadow: 
          0 0 10px #ff6600,
          0 0 20px #ff6600,
          0 0 30px #ff6600;
        animation: line-glow 2s infinite alternate;
      }

      @keyframes line-glow {
        0% {
          box-shadow: 
            0 0 10px #ff6600,
            0 0 20px #ff6600,
            0 0 30px #ff6600;
        }
        100% {
          box-shadow: 
            0 0 15px #ff6600,
            0 0 30px #ff6600,
            0 0 45px #ff6600;
        }
      }

      /* Error codes floating around */
      .error-code {
        position: absolute;
        color: #ff6600;
        font-family: 'Courier New', monospace;
        font-size: 14px;
        opacity: 0.3;
        animation: float 10s infinite ease-in-out;
      }

      @keyframes float {
        0%, 100% {
          transform: translateY(0) rotate(0deg);
        }
        50% {
          transform: translateY(-20px) rotate(5deg);
        }
      }

      /* Responsive adjustments */
      @media (max-width: 1200px) {
        .container {
          max-width: 700px;
        }
        
        .neon-404 {
          font-size: clamp(70px, 12vw, 180px);
        }
        
        .error-message {
          font-size: clamp(22px, 3.5vw, 42px);
        }
      }

      @media (max-width: 992px) {
        .container {
          max-width: 600px;
          padding: 18px;
        }
        
        .neon-404 {
          font-size: clamp(60px, 10vw, 160px);
        }
        
        .error-message {
          font-size: clamp(20px, 3vw, 36px);
        }
        
        .description {
          font-size: clamp(15px, 2.2vw, 18px);
        }
        
        .neon-button {
          padding: 14px 35px;
          font-size: 17px;
        }
        
        .error-code {
          font-size: 12px;
        }
      }

      @media (max-width: 768px) {
        .container {
          padding: 15px;
          max-width: 100%;
        }
        
        .neon-404 {
          font-size: clamp(50px, 8vw, 140px);
          margin-bottom: 15px;
        }
        
        .error-message {
          font-size: clamp(18px, 2.8vw, 32px);
          margin-bottom: 25px;
        }
        
        .description {
          font-size: clamp(14px, 2vw, 16px);
          margin-bottom: 30px;
        }
        
        .neon-button {
          padding: 12px 30px;
          font-size: 16px;
        }
        
        .neon-line {
          width: 180px;
          margin: 25px auto;
        }
        
        .error-code {
          font-size: 11px;
          opacity: 0.2;
        }
      }

      @media (max-width: 576px) {
        .container {
          padding: 12px;
        }
        
        .neon-404 {
          font-size: clamp(40px, 7vw, 120px);
          margin-bottom: 12px;
        }
        
        .error-message {
          font-size: clamp(16px, 2.5vw, 28px);
          margin-bottom: 20px;
        }
        
        .description {
          font-size: clamp(13px, 1.8vw, 15px);
          margin-bottom: 25px;
          line-height: 1.5;
        }
        
        .neon-button {
          padding: 11px 28px;
          font-size: 15px;
          letter-spacing: 1.5px;
        }
        
        .neon-line {
          width: 160px;
          margin: 20px auto;
        }
        
        .error-code {
          font-size: 10px;
          opacity: 0.15;
        }
      }

      @media (max-width: 480px) {
        .container {
          padding: 10px;
        }
        
        .neon-404 {
          font-size: clamp(35px, 6vw, 100px);
          margin-bottom: 10px;
          letter-spacing: 0.05em;
        }
        
        .error-message {
          font-size: clamp(14px, 2.2vw, 24px);
          margin-bottom: 18px;
        }
        
        .description {
          font-size: clamp(12px, 1.6vw, 14px);
          margin-bottom: 20px;
          line-height: 1.4;
        }
        
        .neon-button {
          padding: 10px 25px;
          font-size: 14px;
          letter-spacing: 1px;
          border-radius: 40px;
        }
        
        .neon-line {
          width: 140px;
          margin: 18px auto;
          height: 1.5px;
        }
        
        .error-code {
          font-size: 9px;
          opacity: 0.1;
        }
      }

      @media (max-width: 380px) {
        .container {
          padding: 8px;
        }
        
        .neon-404 {
          font-size: clamp(30px, 5vw, 80px);
          margin-bottom: 8px;
        }
        
        .error-message {
          font-size: clamp(12px, 2vw, 20px);
          margin-bottom: 15px;
        }
        
        .description {
          font-size: clamp(11px, 1.4vw, 12px);
          margin-bottom: 18px;
        }
        
        .neon-button {
          padding: 8px 20px;
          font-size: 12px;
          letter-spacing: 0.8px;
          border-radius: 35px;
        }
        
        .neon-line {
          width: 120px;
          margin: 15px auto;
          height: 1px;
        }
        
        .error-code {
          display: none; /* Hide on very small screens */
        }
      }

      @media (max-width: 320px) {
        .container {
          padding: 5px;
        }
        
        .neon-404 {
          font-size: clamp(25px, 4vw, 60px);
          margin-bottom: 5px;
        }
        
        .error-message {
          font-size: clamp(10px, 1.8vw, 18px);
          margin-bottom: 12px;
        }
        
        .description {
          font-size: clamp(10px, 1.2vw, 11px);
          margin-bottom: 15px;
        }
        
        .neon-button {
          padding: 6px 18px;
          font-size: 11px;
          letter-spacing: 0.6px;
          border-radius: 30px;
        }
        
        .neon-line {
          width: 100px;
          margin: 12px auto;
          height: 1px;
        }
      }

      /* Landscape orientation adjustments */
      @media (max-height: 600px) and (orientation: landscape) {
        .container {
          padding: 10px;
        }
        
        .neon-404 {
          font-size: clamp(40px, 6vw, 80px);
          margin-bottom: 10px;
        }
        
        .error-message {
          font-size: clamp(16px, 2.5vw, 24px);
          margin-bottom: 15px;
        }
        
        .description {
          font-size: clamp(12px, 1.8vw, 14px);
          margin-bottom: 20px;
        }
        
        .neon-button {
          padding: 8px 25px;
          font-size: 14px;
        }
        
        .neon-line {
          margin: 15px auto;
        }
      }

      /* Ultra-wide screens */
      @media (min-width: 1920px) {
        .container {
          max-width: 1000px;
        }
        
        .neon-404 {
          font-size: clamp(100px, 8vw, 250px);
        }
        
        .error-message {
          font-size: clamp(30px, 3vw, 60px);
        }
        
        .description {
          font-size: clamp(18px, 1.5vw, 24px);
        }
        
        .neon-button {
          padding: 18px 50px;
          font-size: 22px;
        }
        
        .neon-line {
          width: 250px;
          height: 3px;
        }
      }

      /* 4K and above */
      @media (min-width: 2560px) {
        .container {
          max-width: 1200px;
        }
        
        .neon-404 {
          font-size: clamp(120px, 6vw, 300px);
        }
        
        .error-message {
          font-size: clamp(36px, 2.5vw, 72px);
        }
        
        .description {
          font-size: clamp(20px, 1.2vw, 28px);
        }
        
        .neon-button {
          padding: 20px 60px;
          font-size: 24px;
        }
        
        .neon-line {
          width: 300px;
          height: 4px;
        }
      }
    </style>
  </head>
  <body>
    <!-- Background animation -->
    <div class="bg-animation" id="bgAnimation"></div>
    
    <!-- Floating error codes -->
    <div class="error-code" style="top: 10%; left: 10%;">ERROR_404</div>
    <div class="error-code" style="top: 20%; right: 15%;">NOT_FOUND</div>
    <div class="error-code" style="bottom: 30%; left: 8%;">MISSING</div>
    <div class="error-code" style="bottom: 15%; right: 10%;">NULL</div>
    
    <div class="container">
      <div class="neon-404">404</div>
      <div class="neon-line"></div>
      <h1 class="error-message">Pagina Non Trovata</h1>
      <p class="description">
        Ops! La pagina che stai cercando sembra essere svanita nel nulla. 
        Forse è stata spostata, eliminata o non è mai esistita.
      </p>
      <a href="/" class="neon-button">Torna alla Home</a>
    </div>

    <script>
      // Create floating particles
      function createParticles() {
        const bgAnimation = document.getElementById('bgAnimation');
        const particleCount = 50;
        
        for (let i = 0; i < particleCount; i++) {
          const particle = document.createElement('div');
          particle.className = 'particle';
          particle.style.left = Math.random() * 100 + '%';
          particle.style.animationDelay = Math.random() * 8 + 's';
          particle.style.animationDuration = (8 + Math.random() * 4) + 's';
          bgAnimation.appendChild(particle);
        }
      }

      // Add random flicker effect to neon elements
      function addFlickerEffect() {
        const neonElements = document.querySelectorAll('.neon-404, .error-message');
        
        neonElements.forEach(element => {
          setInterval(() => {
            if (Math.random() > 0.95) {
              element.style.opacity = '0.8';
              setTimeout(() => {
                element.style.opacity = '1';
              }, 100);
            }
          }, 2000);
        });
      }

      // Initialize animations
      document.addEventListener('DOMContentLoaded', () => {
        createParticles();
        addFlickerEffect();
      });

      // Add some interactive glow on mouse move
      document.addEventListener('mousemove', (e) => {
        const x = e.clientX / window.innerWidth;
        const y = e.clientY / window.innerHeight;
        
        const neon404 = document.querySelector('.neon-404');
        if (neon404) {
          const intensity = 0.5 + (x * y) * 0.5;
          neon404.style.filter = `brightness(${intensity})`;
        }
      });
    </script>
  </body>
</html>
