<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sicurezza Account | FitSuite</title>
    
    <!-- External CSS -->
    <link rel="stylesheet" href="../../../style.css">
    <link rel="stylesheet" href="./cambio_pass_email.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../components/toast/toast.css">
    <link rel="stylesheet" href="../../components/loading_screen/loading_screen.css">
    <link rel="icon" type="image/x-icon" href="../../../image/logo.ico">

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-firestore-compat.js"></script>
    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyCEgbB9rBBKOov3aDma0DMn-EuU0bGMMYo",
        authDomain: "fitsuite-a7b6c.firebaseapp.com",
        projectId: "fitsuite-a7b6c",
        storageBucket: "fitsuite-a7b6c.firebasestorage.app",
        messagingSenderId: "721614273457",
        appId: "1:721614273457:web:195f48279fafd01a1f5b90",
        measurementId: "G-W4ME455MH5"
      };
      firebase.initializeApp(firebaseConfig);
    </script>
</head>
<body class="security-body">
    <!-- Componenti UI comuni -->
    <script src="../../components/loading_screen/loading_screen.js"></script>
    <script src="../../components/toast/toast.js"></script>

    <div class="security-container">
        <div class="security-card glow-card">
            <div class="security-header">
                <div class="logo">FitSuite</div>
                <h1 id="page-title">Sicurezza Account</h1>
                <p id="user-info-display">Caricamento informazioni...</p>
            </div>

            <!-- Form Cambio Password -->
            <form id="change-password-form" class="security-form" style="display: none;">
                <div class="form-group">
                    <label for="new-password">Nuova Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="new-password" placeholder="Inserisci la nuova password" required minlength="6">
                        <button type="button" class="toggle-password" id="toggle-new-password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Conferma Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-shield-alt input-icon"></i>
                        <input type="password" id="confirm-password" placeholder="Conferma la nuova password" required minlength="6">
                        <button type="button" class="toggle-password" id="toggle-confirm-password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <p class="hint">La password deve contenere almeno 6 caratteri.</p>
                </div>

                <button type="submit" class="submit-btn" id="password-submit-btn">
                    <span>Aggiorna Password</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <!-- Form Cambio Email -->
            <form id="change-email-form" class="security-form" style="display: none;">
                <div class="form-group">
                    <label for="new-email">Nuova Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="new-email" placeholder="Inserisci la nuova email" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirm-email">Conferma Email</label>
                    <div class="input-wrapper">
                        <i class="fas fa-check-double input-icon"></i>
                        <input type="email" id="confirm-email" placeholder="Conferma la nuova email" required>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="email-submit-btn">
                    <span>Aggiorna Email</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <!-- Messaggi di Stato -->
            <div id="error-container" class="status-container" style="display: none;">
                <i class="fas fa-exclamation-circle status-icon error"></i>
                <h2 id="error-title">Link non valido</h2>
                <p id="error-message">Il link è scaduto o è già stato utilizzato.</p>
                <a href="../../auth/auth.html" class="status-btn">Torna al Login</a>
            </div>

            <div id="success-container" class="status-container" style="display: none;">
                <i class="fas fa-check-circle status-icon success"></i>
                <h2 id="success-title">Aggiornamento Completato!</h2>
                <p id="success-message">Le modifiche sono state salvate con successo.</p>
                <a href="../../auth/auth.html" class="status-btn">Accedi Ora</a>
            </div>
            
            <div class="back-link">
                <a href="../impostazioni.html"><i class="fas fa-chevron-left"></i> Torna alle impostazioni</a>
            </div>
        </div>
    </div>

    <script src="./cambio_pass_email.js"></script>
</body>
</html>
